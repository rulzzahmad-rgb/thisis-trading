<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radz Cloud - Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .neon-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .modal-active { display: flex !important; animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="pb-32">

    <div id="custom-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="glass w-full max-w-xs p-8 rounded-[2.5rem] text-center neon-glow">
            <div id="modal-icon" class="w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 bg-blue-500/20 text-blue-500 text-2xl">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3 id="modal-title" class="text-xl font-black mb-2">Success!</h3>
            <p id="modal-desc" class="text-xs text-gray-400 mb-6 leading-relaxed">Your project is now live on the global network.</p>
            <div id="modal-action-area" class="space-y-3">
                </div>
            <button onclick="closeModal()" class="mt-6 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Close</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center py-6">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black italic tracking-tighter text-white">RADZ<span class="text-blue-500">.HOST</span></h1>
                <span class="text-[9px] font-black text-blue-500/60 uppercase tracking-widest">Network Stable</span>
            </div>
            <div class="glass px-5 py-3 rounded-2xl border-r-4 border-blue-500">
                <p class="text-[8px] text-gray-500 font-bold uppercase">Main Wallet</p>
                <p id="balance-val" class="text-sm font-black text-white">Rp 0</p>
            </div>
        </header>

        <div id="admin-notice" class="glass p-4 rounded-2xl mb-8 hidden border-l-4 border-yellow-500">
            <div class="flex gap-3">
                <i class="fas fa-bolt text-yellow-500 mt-1"></i>
                <p id="notice-content" class="text-[11px] text-gray-300 font-medium">Memuat info...</p>
            </div>
        </div>

        <section id="home" class="page active">
            <div class="glass p-7 rounded-[2.5rem] mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-5xl italic font-black text-blue-500">CODE</div>
                <h2 class="text-lg font-bold mb-5 flex items-center gap-2">
                    <i class="fas fa-layer-group text-blue-500 text-sm"></i> Instant Deploy
                </h2>
                
                <textarea id="html-code" placeholder="<html> ... </html>" 
                    class="w-full h-56 bg-black/40 border border-white/5 rounded-3xl p-5 text-xs font-mono text-blue-300 focus:border-blue-500/50 outline-none transition-all mb-5 placeholder:opacity-30"></textarea>
                
                <button onclick="startProcessing()" id="btn-deploy"
                    class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-xs tracking-[0.2em] shadow-xl shadow-blue-900/40 active:scale-95 transition-all">
                    LAUNCH PROJECT
                </button>

                <div id="progress-container" class="hidden mt-8">
                    <div class="flex justify-between items-center mb-3">
                        <span id="p-status" class="text-[10px] font-black text-gray-500 uppercase italic">Initializing...</span>
                        <span id="p-percent" class="text-xs font-black text-blue-500">0%</span>
                    </div>
                    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div id="p-bar" class="h-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.8)] transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4 ml-4">My Deployments</h3>
            <div id="site-list" class="space-y-4"></div>
        </section>

        <section id="wallet" class="page">
            <div class="glass p-8 rounded-[3rem] text-center">
                <div class="w-20 h-20 bg-blue-500/10 rounded-[2rem] flex items-center justify-center mx-auto mb-6 border border-blue-500/10">
                    <i class="fas fa-credit-card text-blue-500 text-3xl"></i>
                </div>
                <h2 class="text-xl font-black mb-1">Top Up</h2>
                <p class="text-xs text-gray-500 mb-8">Pilih jumlah pengisian saldo</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="addCredit(5000)" class="glass p-5 rounded-2xl hover:border-blue-500/40 font-black transition">5K</button>
                    <button onclick="addCredit(10000)" class="glass p-5 rounded-2xl hover:border-blue-500/40 font-black transition text-blue-400">10K</button>
                    <button onclick="addCredit(50000)" class="glass p-5 rounded-2xl hover:border-blue-500/40 font-black transition text-blue-500">50K</button>
                    <button onclick="addCredit(100000)" class="glass p-5 rounded-2xl hover:border-blue-500/40 font-black transition text-indigo-500">100K</button>
                </div>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-8 left-8 right-8 h-20 glass rounded-[2.5rem] flex items-center justify-around px-4 z-50 border border-white/5 neon-glow">
        <button onclick="switchTab('home', this)" class="nav-btn active text-blue-500 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-bolt text-lg"></i><span class="text-[8px] font-black uppercase">Home</span>
        </button>
        <button onclick="switchTab('wallet', this)" class="nav-btn text-gray-500 flex flex-col items-center gap-1">
            <i class="fas fa-wallet text-lg"></i><span class="text-[8px] font-black uppercase">Wallet</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f",
            storageBucket: "mybro-9ba5f.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let myID = localStorage.getItem('radz_id') || "RADZ-" + Math.floor(1000 + Math.random() * 8999);
        localStorage.setItem('radz_id', myID);

        // DATA SYNC
        onValue(ref(db, `users/${myID}/profile`), (snap) => {
            if (!snap.exists()) set(ref(db, `users/${myID}/profile`), { balance: 5000 });
            else document.getElementById('balance-val').innerText = "Rp " + snap.val().balance.toLocaleString();
        });

        onValue(ref(db, `admin/announcement`), (snap) => {
            const notice = document.getElementById('admin-notice');
            if (snap.exists() && snap.val() !== "") {
                notice.classList.remove('hidden');
                document.getElementById('notice-content').innerText = snap.val();
            }
        });

        // POPUP ENGINE
        window.showModal = (title, desc, icon, buttons) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-icon').innerHTML = `<i class="fas ${icon}"></i>`;
            const area = document.getElementById('modal-action-area');
            area.innerHTML = "";
            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.className = `w-full ${b.bg || 'bg-blue-600'} py-4 rounded-2xl text-[10px] font-black tracking-widest uppercase shadow-lg`;
                btn.innerText = b.text;
                btn.onclick = b.click;
                area.appendChild(btn);
            });
            document.getElementById('custom-modal').classList.add('modal-active');
        };

        window.closeModal = () => document.getElementById('custom-modal').classList.remove('modal-active');

        window.switchTab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.className = "nav-btn text-gray-500 flex flex-col items-center gap-1");
            el.className = "nav-btn active text-blue-500 flex flex-col items-center gap-1 transition-all";
        };

        // DEPLOY LOGIC
        window.startProcessing = async () => {
            const code = document.getElementById('html-code').value;
            if (!code.trim()) return showModal("Empty!", "Please paste your code first.", "fa-exclamation-triangle", [{text: "OK", click: closeModal}]);

            const snap = await get(ref(db, `users/${myID}/profile`));
            const bal = snap.val().balance || 0;
            if (bal < 1000) return showModal("Low Balance!", "Need Rp 1.000 to deploy.", "fa-wallet", [{text: "TOP UP", click: () => { closeModal(); switchTab('wallet', document.querySelectorAll('.nav-btn')[1]); }}]);

            const pBox = document.getElementById('progress-container');
            const pBar = document.getElementById('p-bar');
            const pText = document.getElementById('p-percent');
            pBox.classList.remove('hidden');

            let width = 0;
            const timer = setInterval(async () => {
                if (width >= 100) {
                    clearInterval(timer);
                    finalizeDeploy(code, bal - 1000);
                } else {
                    width += Math.floor(Math.random() * 20);
                    if(width > 100) width = 100;
                    pBar.style.width = width + "%";
                    pText.innerText = width + "%";
                    document.getElementById('p-status').innerText = width < 50 ? "Encrypting..." : "Syncing to Server...";
                }
            }, 400);
        };

        async function finalizeDeploy(code, newBal) {
            const fileRef = sRef(storage, `host/${myID}/index_${Date.now()}.html`);
            try {
                await uploadString(fileRef, code, 'raw', { contentType: 'text/html' });
                const url = await getDownloadURL(fileRef);
                await update(ref(db, `users/${myID}/profile`), { balance: newBal });
                await push(ref(db, `users/${myID}/deployed`), { name: "Project_" + Date.now().toString().slice(-4), url: url, time: Date.now() });

                document.getElementById('progress-container').classList.add('hidden');
                document.getElementById('html-code').value = "";
                
                showModal("Deployed!", "Your website is online and ready.", "fa-check-double", [
                    {text: "OPEN WEBSITE", click: () => { window.open(url, '_blank'); }},
                    {text: "COPY LINK", bg: "bg-slate-700", click: () => { navigator.clipboard.writeText(url); alert("Link Copied!"); }}
                ]);
            } catch (e) { alert(e.message); }
        }

        // RENDER LIST
        onValue(ref(db, `users/${myID}/deployed`), (snap) => {
            const list = document.getElementById('site-list');
            list.innerHTML = "";
            if (snap.exists()) {
                Object.values(snap.val()).reverse().forEach(site => {
                    const d = document.createElement('div');
                    d.className = "glass p-6 rounded-3xl flex justify-between items-center border border-white/[0.02]";
                    d.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500"><i class="fas fa-link text-xs"></i></div>
                            <div><p class="text-[11px] font-black">${site.name}</p><p class="text-[8px] text-gray-500 uppercase font-bold">${new Date(site.time).toLocaleDateString()}</p></div>
                        </div>
                        <a href="${site.url}" target="_blank" class="bg-white/5 border border-white/5 px-4 py-2 rounded-xl text-[9px] font-black">VIEW</a>
                    `;
                    list.appendChild(d);
                });
            }
        });

        window.addCredit = async (v) => {
            const snap = await get(ref(db, `users/${myID}/profile`));
            await update(ref(db, `users/${myID}/profile`), { balance: (snap.val().balance || 0) + v });
            showModal("Success", `Added Rp ${v.toLocaleString()} to your wallet.`, "fa-wallet", [{text: "GREAT", click: closeModal}]);
        };
    </script>
</body>
</html>
